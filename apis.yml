aid: nannostomus
name: Nannostomus
description: >-
  Nannostomus provides a sex offender search API covering 771k+ offender
  records across all 50 U.S. states and 14 territories. It supports search by
  state and name, with monthly per-state record updates, deduplication, and
  99.9% uptime backed by cloud infrastructure. A free tier covers up to 100
  requests per month with tiered pay-as-you-go pricing beyond that.
